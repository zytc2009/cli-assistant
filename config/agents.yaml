agents:
  claude-opus:
    name: Claude Opus
    cli: claude
    model: claude-opus-4-6
    command: claude -p - --model claude-opus-4-6 --output-format text
    prompt_method: file
    max_tokens: 4000
    timeout: 180
    strengths: 深度推理、架构设计、安全性
    cost_tier: high
  claude-sonnet:
    name: Claude Sonnet
    cli: claude
    model: claude-sonnet-4-6
    command: claude -p - --model claude-sonnet-4-6 --output-format text
    prompt_method: file
    max_tokens: 4000
    timeout: 120
    strengths: 代码实现、快速迭代、性价比高
    cost_tier: medium
  codex-o3:
    name: Codex o3
    cli: codex
    model: o3
    command: codex exec -c approval_mode=full-auto -o {output_file} -
    prompt_method: file
    max_tokens: 4000
    timeout: 180
    strengths: 复杂推理、数学、算法
    cost_tier: high
  codex-default:
    name: Codex
    cli: codex
    model: gpt-5.4
    command: codex exec -c approval_mode=full-auto -o {output_file} -
    prompt_method: file
    max_tokens: 4000
    timeout: 180
    strengths: 工程实现、性能优化、成本低
    cost_tier: low
  kimi:
    name: Kimi
    cli: kimi
    model: default
    command: export PYTHONIOENCODING=utf-8 && cat {prompt_file} | kimi --print --input-format
      text --output-format stream-json
    prompt_method: file
    output_format: json
    max_tokens: 4000
    timeout: 120
    strengths: 产品视角、用户体验、中文场景、长上下文
    cost_tier: medium
  claude:
    name: Claude Code
    cli: claude
    command: claude -p - --output-format text
    prompt_method: file
    max_tokens: 4000
    timeout: 120
    strengths: 深度推理、架构设计、代码实现
    cost_tier: medium
  codex:
    name: OpenAI Codex
    cli: codex
    command: codex exec -c approval_mode=full-auto -o {output_file} -
    prompt_method: file
    max_tokens: 4000
    timeout: 180
    strengths: 复杂推理、数学、算法、工程实现
    cost_tier: medium
  gemini:
    name: Google Gemini
    cli: gemini
    command: cat {prompt_file} | gemini -p " " --yolo
    prompt_method: file
    max_tokens: 4000
    timeout: 120
    strengths: 多模态理解、知识广度
    cost_tier: medium
